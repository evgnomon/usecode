---
blueprint_user: "{{ ansible_facts['user_id'] }}"
go_latest_version: 1.21.6
home: "{{ lookup('env', 'HOME') }}"
target_home: "{{ ansible_facts['env']['HOME'] }}"
local_bin_path: "{{ target_home }}/.local/bin"
blueprint_config_dir: "{{ home }}/.config/blueprint"
blueprint_config_file: "{{ blueprint_config_dir }}/config.yaml"
blueprint_config_file_exists: "{{ lookup('fileglob', blueprint_config_file) | length > 0 }}"

dev_container: false

common_pip_packages:
  - pip
  - docker
  - setuptools
  - pynacl
  - aiohttp
  - pipx
  - pyyaml
  - hcloud
  - pydo
  - azure-core
  - httpx
  - pandas
  - artifacts-keyring
  - pipx
  - pytest
  - pytest-cov
  - pytest-asyncio
  - pydantic
  - pydantic[email]
  - click
  - psycopg2-binary

common_pipx_packages:
  - cookiecutter
  - azure-cli
  - uv
  - ruff
  - pre-commit
  - mypy
  - ansible-lint
  - git-review # needed by Zuul
  - yamllint
  - pylint
  - podman-compose
  - yubikey-manager
  - black
  - coverage
  - poetry
  - sphinx
  - poethepoet
  - yt-dlp
  - llm

common_node_packages:
  - npm
  - prettier
  - nodemon
  - concurrently
  - tsx
  - bash-language-server
  - sass
  - "@anthropic-ai/claude-code"
  - "@github/copilot"
  - '@google/gemini-cli'
  - "azure-functions-core-tools@4"
  - "@continuedev/cli"

common_cargo_packages:
  - drill

common_go_packages:
  - github.com/tomnomnom/gron@latest
  - github.com/golangci/golangci-lint/cmd/golangci-lint@latest
  - github.com/sclevine/yj@latest
  - github.com/zyedidia/eget@latest
  - github.com/digitalocean/doctl/cmd/doctl@latest
  - golang.org/x/tools/cmd/godoc@latest
  - github.com/go-delve/delve/cmd/dlv@latest

eget_packages:
  - name: cli/cli
    archs:
      debian: -a tar.gz
  - name: sharkdp/fd
    archs:
      debian: -a gnu
  - name: dandavison/delta
    archs:
      debian: -a gnu
  - name: BurntSushi/ripgrep
  - name: sharkdp/bat
    archs:
      debian: -a gnu
  - name: gohugoio/hugo
    archs:
      debian: -a extended -a tar.gz -a withdeploy
  - name: rclone/rclone
    archs:
      debian: -a zip
  - name: hetznercloud/cli
    archs:
      debian: -f hcloud -a ^sig
  - name: terraform-linters/tflint
    to: tflint
  - name: containers/gvisor-tap-vsock
    to: gvproxy
  - name: block/goose
    archs:
      debian: -a amd64
  # - name: telegramdesktop/tdesktop
  #   archs:
  #     debian: -a tar.xz -f "Telegram/Telegram"
    to: telegram
  - name: kubernetes/kompose
    archs:
      debian: -a tar.gz
    to: kompose
  - name: YS-L/csvlens
    archs:
      debian: -a gnu
  - name: mikefarah/yq
    archs:
      debian: -a tar.gz -f yq_linux_amd64
    to: yq

debian_go_packages:

common_git_repos:
  - url: ssh://git@github.com/evgnomon/usecode.git
    prefix: &prefix_home_src "{{ ansible_facts['env']['HOME'] }}/src"
