[main]
include=~/.config/blueprint/configs/foot/foot.ini
shell=/home/evgnomon/.local/bin/foot-shell
font=CaskaydiaMono NFM:size=14:style=Regular
font-bold=CaskaydiaMono NFM:size=14:style=Bold
font-italic=CaskaydiaMono NFM:size=14:style=Italic
font-bold-italic=CaskaydiaMono NFM:size=14:style=Bold Italic
initial-window-mode=fullscreen

[environment]
TERM=xterm-256color

[key-bindings]
clipboard-copy=Control+Shift+c
clipboard-paste=Control+Shift+v

[scrollback]
lines=10000

[cursor]
style=block
color=282828 ebdbb2
blink=no

[colors]
# Gruvbox Dark
background=282828
foreground=ebdbb2

# Normal colors
regular0=282828
regular1=cc241d
regular2=98971a
regular3=d79921
regular4=458588
regular5=b16286
regular6=689d6a
regular7=a89984

# Bright colors
bright0=928374
bright1=fb4934
bright2=b8bb26
bright3=fabd2f
bright4=83a598
bright5=d3869b
bright6=8ec07c
bright7=ebdbb2

# UI colors
selection-foreground=282828
selection-background=fabd2f

[bell]
urgent=no
notify=no
visual=no
