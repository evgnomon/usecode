---
- name: Check running in the server
  set_fact:
    wsl2_kernel: "{{ ansible_facts['kernel'] | split('-') | last == 'WSL2' }}"

- include_vars: "{{ item }}"
  with_first_found:
    - "{{ ansible_facts['distribution'] }}-{{ ansible_facts['distribution_major_version'] }}.yml"
    - "{{ ansible_facts['distribution'] }}.yml"
    - "{{ ansible_facts['os_family']}}.yml"

- include_vars: "{{ item }}"
  with_first_found:
    - "pkg_versions.yaml"

- include_vars: "{{ item }}"
  with_first_found:
    - "pkg_charts.yaml"

- include_vars: "{{ item }}"
  with_first_found:
    - "pkg_charts_debian.yaml"
  when: ansible_facts['os_family'] == 'Debian'
