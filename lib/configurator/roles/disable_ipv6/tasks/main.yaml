---
- name: Copy IPv6 disable sysctl configuration
  become: true
  copy:
    src: 99-disable-ipv6.conf
    dest: /etc/sysctl.d/99-disable-ipv6.conf
    owner: root
    group: root
    mode: '0644'
    backup: true

- name: Apply sysctl settings to disable IPv6
  become: true
  command: /usr/sbin/sysctl -p /etc/sysctl.d/99-disable-ipv6.conf

- name: Reload systemd daemon
  become: true
  systemd:
    daemon_reload: true
  when: ansible_facts['service_mgr'] == 'systemd'
