version: "3.9"

services:
  nats:
    image: docker.io/nats:latest
    container_name: ${TENANT}_${NAMESPACE}_${POD}_nats
    restart: unless-stopped
    command: -js -m 8222
    ports:
      - "127.0.0.1:${PORT:-4222}:4222"
      - "127.0.0.1:${MON_PORT:-8222}:8222"
    volumes:
      - /mnt/z/volumes/${TENANT}/${NAMESPACE}/${POD}/nats_data:/data
    networks:
      - z-${TENANT}-${NAMESPACE}-${POD}
      - z-${TENANT}

networks:
  z-${TENANT}-${NAMESPACE}-${POD}:
    external: true
  z-${TENANT}:
    external: true
