version: "3.9"

services:
  prometheus:
    image: docker.io/prom/prometheus:latest
    container_name: ${TENANT}_${NAMESPACE}_${POD}_prometheus
    restart: unless-stopped
    ports:
      - "127.0.0.1:${PORT}:9090"
    volumes:
      - /mnt/z/volumes/${TENANT}/${NAMESPACE}/${POD}/prometheus_data:/prometheus
    networks:
      - z-${TENANT}-${NAMESPACE}-${POD}
      - z-${TENANT}

networks:
  z-${TENANT}-${NAMESPACE}-${POD}:
    external: true
  z-${TENANT}:
    external: true
